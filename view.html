<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini-Värd – sida</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D'http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg'%20viewBox%3D'0%200%2064%2064'%3E%3Crect%20width%3D'64'%20height%3D'64'%20rx%3D'14'%20fill%3D'%232563eb'%2F%3E%3Cpath%20d%3D'M14%2046V18h6l8%2014%208-14h6v28h-6V30l-6%2010h-4l-6-10v16z'%20fill%3D'white'%2F%3E%3C%2Fsvg%3E" />
  <style>
    html, body { margin: 0; height: 100%; background: #1c2030; color: #e8eaf0; font-family: system-ui, sans-serif; }
    #status { padding: 20px; text-align: center; }
    iframe { border: 0; width: 100%; height: 100vh; background: #fff; display: block; }
    a { color: #93c5fd; }
  </style>
</head>
<body>
  <div id="status">Laddar…</div>
  <iframe id="frame" hidden sandbox="allow-scripts allow-forms allow-modals"></iframe>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAElhf7kYZbEo54MR3VO5nBBtipEw4IIVE",
      authDomain: "hosting-9c87a.firebaseapp.com",
      projectId: "hosting-9c87a",
      storageBucket: "hosting-9c87a.firebasestorage.app",
      messagingSenderId: "876600243013",
      appId: "1:876600243013:web:6d3e1cab364b097cecc42c",
      measurementId: "G-YCTWS09985",
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const FAVICON = "data:image/svg+xml,%3Csvg%20xmlns%3D'http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg'%20viewBox%3D'0%200%2064%2064'%3E%3Crect%20width%3D'64'%20height%3D'64'%20rx%3D'14'%20fill%3D'%232563eb'%2F%3E%3Cpath%20d%3D'M14%2046V18h6l8%2014%208-14h6v28h-6V30l-6%2010h-4l-6-10v16z'%20fill%3D'white'%2F%3E%3C%2Fsvg%3E";

    // Injected into every rendered page: redirect navigation to parent via postMessage
    const NAV_SCRIPT =
      "(function(){window.__mvgo=function(u){if(!u)return;" +
      "if(/^([a-z]+:)?\\/\\//i.test(u))return;if(u.charAt(0)==='#'||u.indexOf('javascript:')===0)return;" +
      "parent.postMessage({type:'mv-nav',url:u},'*')};" +
      "document.addEventListener('click',function(e){var a=e.target&&e.target.closest&&e.target.closest('a[href]');" +
      "if(!a)return;var h=a.getAttribute('href');if(!h||/^([a-z]+:)?\\/\\//i.test(h)||h.charAt(0)==='#'||h.indexOf('javascript:')===0)return;" +
      "e.preventDefault();window.__mvgo(h)},true);" +
      "document.addEventListener('submit',function(e){var f=e.target;if(!f||f.tagName!=='FORM')return;" +
      "var a=f.getAttribute('action');if(!a||/^([a-z]+:)?\\/\\//i.test(a))return;e.preventDefault();window.__mvgo(a)},true);" +
      "})();";

    // The iframe is sandboxed without allow-same-origin (for security) which
    // means native localStorage/sessionStorage throw SecurityError. We inject
    // a synchronous in-memory shim that persists to the parent via postMessage.
    // Parent stores per-siteId data in its own localStorage under LS_GUEST_PREFIX.
    const LS_GUEST_PREFIX = "miniVard.guestls.";
    const LS_GUEST_MAX_BYTES = 200 * 1024; // cap per-site to avoid filling parent storage

    function buildStorageScript(initialJson) {
      return (
        "(function(){var data=" + initialJson + "||{};" +
        "function persist(){try{parent.postMessage({type:'mv-ls',data:data},'*');}catch(_){}}" +
        "var fake={" +
          "getItem:function(k){k=String(k);return Object.prototype.hasOwnProperty.call(data,k)?String(data[k]):null;}," +
          "setItem:function(k,v){data[String(k)]=String(v);persist();}," +
          "removeItem:function(k){delete data[String(k)];persist();}," +
          "clear:function(){for(var k in data)if(Object.prototype.hasOwnProperty.call(data,k))delete data[k];persist();}," +
          "key:function(i){var ks=Object.keys(data);return i>=0&&i<ks.length?ks[i]:null;}" +
        "};" +
        "Object.defineProperty(fake,'length',{get:function(){return Object.keys(data).length;}});" +
        "try{Object.defineProperty(window,'localStorage',{value:fake,configurable:true});}catch(_){}" +
        "try{Object.defineProperty(window,'sessionStorage',{value:fake,configurable:true});}catch(_){}" +
        "})();"
      );
    }

    function guestStorageKey(id) { return LS_GUEST_PREFIX + id; }
    function readGuestStorage(id) {
      try {
        const raw = localStorage.getItem(guestStorageKey(id));
        if (!raw) return {};
        const obj = JSON.parse(raw);
        return obj && typeof obj === "object" ? obj : {};
      } catch { return {}; }
    }
    function writeGuestStorage(id, data) {
      try {
        const json = JSON.stringify(data || {});
        if (json.length > LS_GUEST_MAX_BYTES) return; // silently drop oversize writes
        localStorage.setItem(guestStorageKey(id), json);
      } catch {}
    }

    const status = document.getElementById("status");
    const frame = document.getElementById("frame");

    let allFiles = null;
    let siteName = "";
    let currentSiteId = "";

    function showError(text) {
      status.innerHTML = "";
      const p = document.createElement("p");
      p.textContent = text;
      const back = document.createElement("p");
      back.innerHTML = '<a href="index.html">Tillbaka till Mini-Värd</a>';
      status.append(p, back);
      status.hidden = false;
      frame.hidden = true;
    }

    function buildSrcDoc(files, entryPage) {
      const html = files[entryPage];
      if (!html) throw new Error(entryPage + " saknas.");

      const parser = new DOMParser();
      const docp = parser.parseFromString(html, "text/html");

      // Inline external script files
      docp.querySelectorAll("script[src]").forEach((el) => {
        const key = matchFile(el.getAttribute("src"), files);
        if (key) {
          const replacement = docp.createElement("script");
          for (const attr of [...el.attributes]) {
            if (attr.name !== "src") replacement.setAttribute(attr.name, attr.value);
          }
          replacement.textContent = files[key];
          el.replaceWith(replacement);
        }
      });

      // Inline external stylesheet files
      docp.querySelectorAll("link[href]").forEach((el) => {
        const rel = (el.getAttribute("rel") || "").toLowerCase();
        if (rel && rel !== "stylesheet") return;
        const key = matchFile(el.getAttribute("href"), files);
        if (key) {
          const style = docp.createElement("style");
          style.textContent = files[key];
          el.replaceWith(style);
        }
      });

      // Rewrite navigation patterns in inline scripts and on*-attributes so
      // window.location.href='x.html' etc. routes through __mvgo (postMessage)
      // instead of triggering a real navigation that the iframe sandbox blocks.
      docp.querySelectorAll("script:not([src])").forEach((el) => {
        el.textContent = rewriteLocationCalls(el.textContent);
      });
      docp.querySelectorAll("*").forEach((el) => {
        for (const attr of [...el.attributes]) {
          if (!attr.name.startsWith("on")) continue;
          const v = rewriteLocationCalls(attr.value);
          if (v !== attr.value) el.setAttribute(attr.name, v);
        }
      });

      // Inject navigation helper at the very top of <head> so it runs before
      // any page script tries to navigate.
      const nav = docp.createElement("script");
      nav.textContent = NAV_SCRIPT;
      docp.head?.prepend(nav);

      // Inject localStorage shim (must run before any user script). Pre-load
      // with previously persisted data for this site so reads are synchronous.
      const initial = JSON.stringify(readGuestStorage(currentSiteId || ""));
      const storage = docp.createElement("script");
      storage.textContent = buildStorageScript(initial);
      docp.head?.prepend(storage);

      // Inject favicon if the page has none
      if (!docp.querySelector('link[rel~="icon"]')) {
        const ic = docp.createElement("link");
        ic.setAttribute("rel", "icon");
        ic.setAttribute("href", FAVICON);
        docp.head?.prepend(ic);
      }

      return "<!DOCTYPE html>\n" + docp.documentElement.outerHTML;
    }

    function rewriteLocationCalls(src) {
      return src
        .replace(/\b(?:(?:window|document|self|top)\.)?location\.href\s*=\s*(['"`])([^'"`]+)\1/g,
                 "__mvgo($1$2$1)")
        .replace(/\b(?:window|document|self|top)\.location\s*=\s*(['"`])([^'"`]+)\1/g,
                 "__mvgo($1$2$1)")
        .replace(/\b(?:(?:window|document|self|top)\.)?location\s*\.\s*(?:assign|replace)\s*\(\s*(['"`])([^'"`]+)\1\s*\)/g,
                 "__mvgo($1$2$1)");
    }

    function matchFile(ref, files) {
      if (!ref) return null;
      if (/^([a-z]+:)?\/\//i.test(ref) || ref.startsWith("data:") || ref.startsWith("blob:")) return null;
      let clean = ref.replace(/^\.?\//, "");
      clean = clean.split("?")[0].split("#")[0];
      if (files[clean]) return clean;
      const base = clean.split("/").pop();
      if (files[base]) return base;
      return null;
    }

    function normalizeRef(ref) {
      if (!ref) return null;
      if (/^([a-z]+:)?\/\//i.test(ref) || ref.startsWith("data:") || ref.startsWith("blob:")) return null;
      return ref.replace(/^\.?\//, "").split("?")[0].split("#")[0];
    }

    function renderPage(page) {
      if (!allFiles) return;
      const target = allFiles[page] ? page : (allFiles[page.split("/").pop()] ? page.split("/").pop() : null);
      if (!target) {
        showError("Sidan '" + page + "' hittades inte i den här webbplatsen.");
        return;
      }
      try {
        const srcdoc = buildSrcDoc(allFiles, target);
        frame.srcdoc = srcdoc;
        frame.hidden = false;
        status.hidden = true;
      } catch (err) {
        showError("Kunde inte rendera sidan: " + err.message);
      }
    }

    async function load() {
      const id = location.hash.replace(/^#/, "").trim();
      if (!id) return showError("Ingen sid-ID angiven.");
      currentSiteId = id;

      const cached = readCache(id);
      if (cached) {
        allFiles = cached.files;
        siteName = cached.name || "";
        document.title = siteName ? siteName + " – Mini-Värd" : "Mini-Värd – sida";
        renderPage("index.html");
        return;
      }

      try {
        const snap = await getDoc(doc(db, "sites", id));
        if (!snap.exists()) return showError("Sidan hittades inte (ID: " + id + ").");
        const data = snap.data();
        writeCache(id, { name: data.name, files: data.files || {} });
        allFiles = data.files || {};
        siteName = data.name || "";
        document.title = siteName ? siteName + " – Mini-Värd" : "Mini-Värd – sida";
        renderPage("index.html");
      } catch (err) {
        showError("Kunde inte ladda sidan: " + err.message);
      }
    }

    // Receive navigation requests from sandboxed iframe
    window.addEventListener("message", (e) => {
      if (!e.data) return;
      if (e.data.type === "mv-nav") {
        const target = normalizeRef(e.data.url);
        if (!target) return;
        renderPage(target);
        return;
      }
      if (e.data.type === "mv-ls") {
        if (!currentSiteId) return;
        const obj = (e.data.data && typeof e.data.data === "object") ? e.data.data : {};
        writeGuestStorage(currentSiteId, obj);
        return;
      }
    });

    // --- Viewer cache (5 min TTL) ---
    const CACHE_TTL_MS = 5 * 60 * 1000;
    function cacheKey(id) { return "miniVard.view." + id; }
    function readCache(id) {
      try {
        const raw = localStorage.getItem(cacheKey(id));
        if (!raw) return null;
        const entry = JSON.parse(raw);
        if (!entry || !entry.ts || Date.now() - entry.ts > CACHE_TTL_MS) return null;
        return { name: entry.name, files: entry.files };
      } catch { return null; }
    }
    function writeCache(id, data) {
      try {
        localStorage.setItem(cacheKey(id), JSON.stringify({
          name: data.name, files: data.files, ts: Date.now(),
        }));
      } catch {}
    }

    window.addEventListener("hashchange", load);
    load();
  </script>
</body>
</html>
