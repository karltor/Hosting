<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin – Leaderboard</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D'http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg'%20viewBox%3D'0%200%2064%2064'%3E%3Crect%20width%3D'64'%20height%3D'64'%20rx%3D'14'%20fill%3D'%23dc2626'%2F%3E%3Cpath%20d%3D'M32%2010l18%208v14c0%2012-8%2020-18%2022-10-2-18-10-18-22V18z'%20fill%3D'white'%2F%3E%3C%2Fsvg%3E" />
  <link rel="stylesheet" href="../../style.css" />
  <link rel="stylesheet" href="../leaderboard.css" />
</head>
<body>
  <main class="layout">
    <section class="panel">
      <div class="panel-head">
        <a href="../" class="back-link">← Tillbaka till leaderboard</a>
        <h2>🛡️ Admin</h2>
        <span id="adminWho" class="site-count" hidden></span>
        <button id="signOutBtn" hidden>Logga ut</button>
      </div>

      <div id="signInBox" class="signin-box" hidden>
        <p>Logga in med Google för att hantera leaderboard.</p>
        <p style="font-size:.8rem;">(Endast karl.tornered@nyamunken.se godkänns)</p>
        <button id="signInBtn">Logga in med Google</button>
        <p id="signInMsg" class="msg"></p>
      </div>

      <div id="adminPanel" hidden>
        <div class="admin-section">
          <h3>Publicerade poster</h3>
          <p style="color:var(--muted); font-size:.85rem;">Här kan du ta bort poster och banna författare.</p>
          <div id="publishedList"></div>
        </div>

        <div class="admin-section">
          <h3>Bannlysta användare</h3>
          <p style="color:var(--muted); font-size:.85rem;">Bannlysta UIDs kan inte publicera eller rösta. Avbanna genom att klicka.</p>
          <div id="bannedList"></div>
        </div>
      </div>
    </section>
  </main>

  <script type="module" src="admin.js"></script>
</body>
</html>
